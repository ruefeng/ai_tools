{% extends "base.html" %}

{% block title %}配置生成器{% endblock %}

{% block content %}
<div class="banner">配置生成页面</div>

<div class="column-full-width" spellcheck="false">
    <label for="template-select">选择实例模板</label>
    <select id="template-select">
        <option value="">-- 请选择模板 --</option>
        {% for file in files %}
        <option value="{{ file }}">{{ file }}</option>
        {% endfor %}
    </select>
</div>

<div class="container" spellcheck="false">
    <div class="column middle-column">
        <label for="yaml-data-textarea">YAML 数据</label>
        <textarea id="yaml-data-textarea" placeholder="选择模板后自动加载示例 YAML，也可手动粘贴或编辑..."></textarea>
    </div>

    <div class="column right-column">
        <div class="header-row">
            <label for="j2-template-textarea">配置模板</label>
            <button id="generate-button">开始生成配置</button>
        </div>
        <textarea id="j2-template-textarea" placeholder="选择模板后自动加载 Jinja2 模板..."></textarea>
    </div>
</div>

<div class="full-width-textarea">
    <label for="generated-config-textarea">生成的配置</label>
    <textarea id="generated-config-textarea" readonly></textarea>
</div>

<div class="full-width-textarea">
    <label for="json-data-textarea">发向后端的 JSON 数据</label>
    <textarea id="json-data-textarea" readonly></textarea>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/config_generator.js') }}"></script>
{% endblock %}
