{% extends "base.html" %}

{% block title %}YAML / JSON 互转{% endblock %}

{% block content %}
<div class="banner">YAML / JSON 互转</div>

<p class="page-subtitle">
    上方为文本输入框（按行/按空白分列；第一行为 key），点击"转换为 YAML/JSON"或输入后会同时写入下方两个输出框。<br>
    下方 YAML 与 JSON 两个输出框也可直接粘贴/输入对应格式：在任意一个框输入，另一个会自动清空并渲染。
</p>

<!-- 顶部：文本输入框放在最上方 -->
<div class="column-full-width" spellcheck="false">
    <div class="header-row">
        <label for="t2y-input">文本输入（按行/按空白分列；第一行为 key）</label>
        <button id="t2y-convert-btn" type="button">转换为 YAML/JSON</button>
    </div>
    <textarea id="t2y-input" placeholder="示例：&#10;device ip vlan&#10;siteA 10.0.0.1 10&#10;siteB 10.0.0.2 20&#10;siteA 10.0.0.3 30"></textarea>
    <div id="t2y-input-msg" class="field-message" aria-live="polite"></div>
</div>

<!-- 下方：YAML + JSON 左右并排 -->
<div class="yaml-json-row" spellcheck="false">
    <div class="yaml-json-column">
        <div class="header-row">
            <label for="t2y-yaml">YAML</label>
        </div>
        <textarea id="t2y-yaml" placeholder="在此输入 YAML...&#10;例如：&#10;name: siteA&#10;ip: 10.0.0.1&#10;vlan: 10"></textarea>
        <div id="t2y-yaml-msg" class="field-message" aria-live="polite"></div>
    </div>

    <div class="yaml-json-column">
        <div class="header-row">
            <label for="t2y-json">JSON</label>
        </div>
        <textarea id="t2y-json" placeholder='在此输入 JSON...&#10;例如：&#10;{&#10;  "name": "siteA",&#10;  "ip": "10.0.0.1",&#10;  "vlan": 10&#10;}'></textarea>
        <div id="t2y-json-msg" class="field-message" aria-live="polite"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="{{ url_for('static', filename='js/text_to_yaml.js') }}"></script>
{% endblock %}
